<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Plataforma de Serviços</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<header class="hero">
    <h1>Plataforma GetService</h1>
    <p>Encontre ou ofereça serviços de forma fácil e rápida.</p>

    <img src="http://localhost:9000/image/imgIndexBanner01.png" alt="Ilustração" style="width:300px;">
</header>

<section class="actions">
    <h2>O que deseja fazer?</h2>

    <div class="cards">
        <div class="card blue" onclick="irParaCriar()">
            <h3>Criar Solicitação</h3>
            <p>Peça um serviço</p>
        </div>

        <div class="card green" onclick="irParaLista()">
            <h3>Ver Solicitações</h3>
            <p>Consultar pedidos</p>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 Get Service LTDA</p>
    <div>
        <a href="#">Sobre</a>
        <a href="#">Contato</a>
    </div>
</footer>

<script src="script.js"></script>
</div>
</body>
</html>
