<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Plataforma de Serviços</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
    <h1>Plataforma de Solicitação de Serviços</h1>
    <p>Encontre ou ofereça serviços de forma fácil e rápida.</p>

    <img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" alt="Ilustração">
</header>

<section class="actions">
    <h2>O que deseja fazer?</h2>

    <div class="cards">
        <div class="card blue" onclick="irParaCriar()">
            <h3>Criar Solicitação</h3>
            <p>Peça um serviço</p>
        </div>

        <div class="card green" onclick="irParaLista()">
            <h3>Ver Solicitações</h3>
            <p>Consultar pedidos</p>
        </div>
    </div>
</section>

<footer>
    <p>© 2024 Plataforma de Serviços</p>
    <div>
        <a href="#">Sobre</a>
        <a href="#">Contato</a>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
