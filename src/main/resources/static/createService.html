<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Solicitação</title>
  <link rel="stylesheet" href="css/createStyle.css">

</head>
<body>

<a href="index.html" class="home-button" aria-label="Voltar para página inicial">
  <img src="image/iconHomePage.png" alt="Home">
</a>

<div class="page">
<main class="container">
  <h1 class="page-title">Criar Solicitação</h1>
  <p class="page-subtitle">Preencha os campos abaixo para solicitar um serviço.</p>

  <div class="card">
    <form>
      <div class="form-group">
        <label for="nome">Nome <span class="required">*</span></label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
      </div>

      <div class="form-group">
        <label for="contato">Contato <span class="required">*</span></label>
        <input type="text" id="contato" name="contato" placeholder="Numero sem caracteres: DDD9xxxxxxxx" required>
      </div>

      <div class="form-group">
        <label for="titulo">Título do Serviço <span class="required">*</span></label>
        <input type="text" id="titulo" name="titulo" placeholder="Resuma o serviço que precisa" required>
      </div>

      <div class="form-group">
        <label for="descricao">Descrição <span class="required">*</span></label>
        <textarea id="descricao" name="descricao" placeholder="Descreva o serviço com mais detalhes" required></textarea>
      </div>

      <div class="button-container">
        <button type="button" onclick="enviarSolicitacao()" class="btn-submit">Enviar Solicitação</button>
      </div>
    </form>
  </div>
</main>
</div>
<footer>
  <div class="content">
    <p>© 2026 Get Service LTDA</p>
    <div>
      <a href="#">Sobre</a>
      <a href="#">Contato</a>
    </div>
  </div>
</footer>
</body>
<script src="/js/script.js"> </script>
</html>
